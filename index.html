<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Planner</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="planner">
        <!-- Header -->
        <header class="planner-header">
            <div class="date-block">
                <h1 class="date-title>Sunday, June 7</h1>
                <p class="date-subtitle">Week 23. Start strong. Finish stronger</p>
            </div>
            <div class="mood-block">
                <p class="mood-title">Today's Mood</p>
                <div class="mood-row">
                        <button class="mood-btn">😔</button>
                        <button class="mood-btn">😐</button>
                        <button class="mood-btn active">😊</button>
                        <button class="mood-btn">😄</button>
                        <button class="mood-btn">🤩</button>
                </div>
            </div>
        </header>
</html>
